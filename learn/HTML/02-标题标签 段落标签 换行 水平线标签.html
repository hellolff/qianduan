<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- 标签名：h1-h6（双标签）独占一行 -->
    <!-- h1在一个页面只用一次 -->
    <h1>一级标题</h1>
    <!-- 段落标签 换行 p双标签-->
    <p>vue 是什么</p>

    <!-- br 换行标签 -->
    第一行内容
    <br>
    第二行内容
    <!-- 水平线 -->
    <hr>
    <h2>二级标题</h2>
</body>

</html>
