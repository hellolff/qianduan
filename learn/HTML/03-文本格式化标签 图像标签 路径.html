<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>03-文本格式化标签 图像标签 路径</title>
</head>

<body>
    <strong>strong 加粗</strong>
    <b>b 加粗</b>

    <em>em 倾斜</em>
    <i> i 倾斜</i>

    <ins>ins 下划线</ins>
    <u>u 下划线</u>

    <del> del 删除线</del>
    <s>s 删除线</s>
    <hr>
    <br>
    <br>
    <!-- 测试图片 -->
    <!-- 属性名=属性值  整个叫属性 用空格隔开，不区分先后顺序 -->
    <img src="img/1234.jpg" alt="这是一幅图">
    <br><br>
    <!-- alt 图片加载不出来提示信息，title图片的标题信息 -->
    <img src="img/123.jpg" title="这是美丽的图片">
    <!-- width 设置宽 height设置高   默认设置一个会等比例缩放对应宽高 -->
    <img src="img/123.jpg" width="800" height="1000">

    <!-- 相对路径 当前位置出发找目标 -->
    <!-- /进入某个文件夹里面    ./当前文件所在文件夹 ../进入上一文件夹 -->
    <!-- 绝对路径 从盘符出发找目标  -->
    <img src="./img/123.jpg" title="这是美丽的图片">
    <img src="../learn/img/123.jpg" alt="">
    <img src="https://www.itheima.com/images/logo.png">
</body>

</html>
