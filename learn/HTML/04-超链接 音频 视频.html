<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <a href="https://www.itheima.com/">跳转到黑马</a>
    <br>
    <!-- target="_blank" 新窗口跳转页面-->
    <a href="./01-标签写法及关系 HTML基本骨架  注释.html" target="_blank">跳转到本地01</a>
    <!-- 开发初期，不知道跳转到那个地址，href属性值写#，表示空链接，不会跳转 -->
    <a href="#">空链接</a>

    <br>
    <!-- 音频播放标签 -->
    <!-- src=支持MP3、ogg、wav   -->
    <!-- controls 显示音频控制面板 loop 循环播放   autoplay 自动播放 浏览器会禁用这个功能 -->
    <!-- 如果属性名=属性值 可以简写成一个单词 -->
    <audio src="" controls loop autoplay></audio>

    <!-- 视频播放标签 -->
    <!-- src=支持MP4、webm、ogg   -->
    <!-- controls 显示视频控制面板 loop 循环播放 muted 静音播放  autoplay 自动播放 浏览器会禁用这个功能 -->
    <!-- 如果属性名=属性值 可以简写成一个单词 -->
    <video src="" controls loop muted autoplay></video>
</body>

</html>
